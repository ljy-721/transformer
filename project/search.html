<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div, input {
            box-sizing: border-box;
        }
        .searchIpt {
            position: relative;
            width: 180px;
            height: 30px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            z-index: 9;
        }
        .searchIpt>input {
            border: 0;
            outline: none;
            width: 100%;
            height: 100%;
            padding-left: 0.5em;
        }
        .searchIpt-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 8;
            display: none;
        }
        .searchIpt-select {
            position: absolute;
            top: 35px;
            left: 0;
            width: 100%;
            max-height: 500px;
            min-height: 100px;
            overflow-y: auto;
            box-shadow: 0 0 10px 1px #eee;
            font-size: 14px;
            display: none;
        }
        .searchIpt-select-it {
            padding: 0 5px;
            width: 100%;
            height: 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .searchIpt-select-it-text {
            width: 0;
            flex-grow: 1;
            cursor: pointer;
        }
        .searchIpt-select-it-text label {
            display: inline-block;
            width: 100%;
            cursor: pointer;
        }
        .searchIpt-select-it-ipt {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="searchIpt-mask" id="searchIpt-mask" onclick="closeSearchIpt()"></div>
    <div class="searchIpt">
        <input type="text" placeholder="请输入" onfocus="openSearchIpt()" oninput="searchIptChange(this)">
        <div class="searchIpt-select" id="searchIpt-select">
            <!-- <div class="searchIpt-select-it">
                <input type="checkbox" id="searchIpt-select-it1" checked class="searchIpt-select-it-ipt">
                <div class="searchIpt-select-it-text">
                    <label for="searchIpt-select-it1">123</label>
                </div>
            </div> -->
        </div>
    </div>
</body>
<script>
    let keyword = '';
    // 输入框内容改变
    function searchIptChange(e){
        keyword = e.value;
        getList();
    };
    // 关闭输入选择框
    function closeSearchIpt(){
        let searchIptMask = document.getElementById('searchIpt-mask');
        searchIptMask.style.display = 'none';
        let searchIptSelect = document.getElementById('searchIpt-select');
        searchIptSelect.style.display = 'none';
    };
    // 打开输入选择框
    function openSearchIpt(){
        let searchIptMask = document.getElementById('searchIpt-mask');
        searchIptMask.style.display = 'block';
        let searchIptSelect = document.getElementById('searchIpt-select');
        searchIptSelect.style.display = 'block';
    }
    // 遍历插入 html
    function initHtml(list = []){
        let searchIptSelect = document.getElementById('searchIpt-select')
        searchIptSelect.innerHTML = '';
        let html = '';
        for (let index = 0; index < list.length; index++) {
            const elem = list[index];
            html += `
            <div class="searchIpt-select-it">
                <input type="checkbox" id="searchIpt-select-it${index}" ${elem.check?'checked':''} class="searchIpt-select-it-ipt">
                <div class="searchIpt-select-it-text">
                    <label for="searchIpt-select-it${index}">${elem.name}</label>
                </div>
            </div>
            `;
        }
        searchIptSelect.innerHTML = html;
    }
    // 获取可选列表
    function getList(){
        // 获取到数据 
        let list = [
            {
                check: true,
                name: '张三'
            },
            {
                check: false,
                name: '李四'
            },
            {
                check: true,
                name: '王五'
            },
        ];
        initHtml(list)
    }
    window.onload = () => {
        getList();
    }
</script>
</html>
